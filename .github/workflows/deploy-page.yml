name: Deploy Blazor WebAssembly to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure API base URL
        shell: bash
        run: |
          if [[ -z "${API_BASE_URL}" ]]; then
            echo "API_BASE_URL is not set in the github-pages environment variables." >&2
            exit 1
          fi

          cat > SubscriptionManager.blazor/wwwroot/appsettings.json <<EOF
          {
            "ApiBaseUrl": "${API_BASE_URL}"
          }
          EOF

      - name: Publish Blazor WebAssembly
        run: dotnet publish SubscriptionManager.blazor/SubscriptionManager.blazor.csproj --configuration Release --output publish

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "${repo_name}" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            base_href="/"
          else
            base_href="/${repo_name}/"
          fi

          sed -i "s|<base href=\"/\" />|<base href=\"${base_href}\" />|" publish/wwwroot/index.html
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
