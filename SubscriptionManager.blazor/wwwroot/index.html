<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubTrack</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link id="favicon" rel="icon" type="image/png" href="favicon.png?v=6" />
    <link href="SubscriptionManager.blazor.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link id="apple-touch-icon-512" rel="apple-touch-icon" sizes="512x512" href="icon-512.png?v=6" />
    <link id="apple-touch-icon-192" rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=6" />
    <script type="importmap"></script>
    <script>
        // FOUC 방지: WASM 부트 전에 설정 테마로 반영
        (function () {
            try {
                var stored = localStorage.getItem('subtrack_theme');
                var isDark;
                if (stored === 'Light') isDark = false;
                else if (stored === 'Dark') isDark = true;
                else isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                var apple512Href = isDark ? 'icon-512-dark.png?v=6' : 'icon-512.png?v=6';
                var apple192Href = isDark ? 'icon-192-dark.png?v=6' : 'icon-192.png?v=6';
                document.getElementById('favicon')?.setAttribute('href', 'favicon.png?v=6');
                document.getElementById('apple-touch-icon-512')?.setAttribute('href', apple512Href);
                document.getElementById('apple-touch-icon-192')?.setAttribute('href', apple192Href);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('favicon')?.setAttribute('href', 'favicon.png?v=6');
                document.getElementById('apple-touch-icon-512')?.setAttribute('href', 'icon-512-dark.png?v=6');
                document.getElementById('apple-touch-icon-192')?.setAttribute('href', 'icon-192-dark.png?v=6');
            }
        })();
    </script>
    <script src="js/theme.js"></script>
    <script src="js/theme-switcher.js"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading" role="status" aria-live="polite">
            <div class="app-loading-mark">
                <img src="images/subtrack_black.png?v=5"
                     data-light-src="images/subtrack_black.png?v=5"
                     data-dark-src="images/subtrack_white.png?v=5"
                     alt="SubTrack"
                     class="app-loading-logo" />
            </div>
            <div class="app-loading-title">SubTrack</div>
            <div class="app-loading-subtitle">로드 중입니다...</div>
            <div class="app-loading-bar" aria-hidden="true">
                <div class="app-loading-bar-fill"></div>
            </div>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <script>
        (function () {
            function applyThemeAssets() {
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                var apple512Href = isDark ? 'icon-512-dark.png?v=6' : 'icon-512.png?v=6';
                var apple192Href = isDark ? 'icon-192-dark.png?v=6' : 'icon-192.png?v=6';
                document.getElementById('favicon')?.setAttribute('href', 'favicon.png?v=6');
                document.getElementById('apple-touch-icon-512')?.setAttribute('href', apple512Href);
                document.getElementById('apple-touch-icon-192')?.setAttribute('href', apple192Href);

                var logo = document.querySelector('.app-loading-logo');
                if (logo) {
                    logo.setAttribute('src', isDark ? logo.dataset.darkSrc : logo.dataset.lightSrc);
                }
            }

            applyThemeAssets();
            new MutationObserver(applyThemeAssets).observe(document.documentElement, {
                attributes: true,
                attributeFilter: ['data-theme']
            });
        })();
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script>
        window.downloadFile = function (fileName, contentType, base64Data) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = `data:${contentType};base64,${base64Data}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
    </body>

</html>
